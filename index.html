<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動登陸轉址系統</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { color: #333; }
        .error { color: #e74c3c; font-weight: bold; font-size: 1.5em; }
        .success { color: #2ecc71; font-weight: bold; font-size: 1.5em; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="status-title">正在驗證您的現場身分...</h2>
        <p id="status-desc">請稍候，系統正在確認您是否在服務台現場。</p>
    </div>

    <script>
        // 目標 Google 表單網址
        const targetFormUrl = "https://forms.gle/hpZ8QvgH2Xy8M78a6"; 
        
        // 設定 QR Code 的有效時限（考慮到網路載入，建議設定 70 秒，防弊效果最好）
        const expireSeconds = 70; 

        // 1. 取得網址參數中的時間戳記 (t)
        const urlParams = new URLSearchParams(window.location.search);
        const qrcodeTime = parseInt(urlParams.get('t'), 10); 

        // 2. 取得手機當前時間
        const currentTime = Math.floor(Date.now() / 1000); 

        const statusTitle = document.getElementById('status-title');
        const statusDesc = document.getElementById('status-desc');

        // 3. 核心防弊驗證邏輯
        if (!qrcodeTime || isNaN(qrcodeTime)) {
            // 狀況 A：網址沒有帶時間參數（自己打網址或從歷史紀錄點入）
            statusTitle.innerHTML = "❌ 驗證失敗";
            statusTitle.className = "error";
            statusDesc.innerHTML = "無效的掃描方式，請至服務台重新掃描最新的QR Code";

        } else if (currentTime - qrcodeTime > expireSeconds) {
            // 狀況 B：時間差大於設定秒數（QR Code 已更新，或是拍回家、傳給別人的過期連結）
            statusTitle.innerHTML = "⏰ QR Code 已過期";
            statusTitle.className = "error";
            statusDesc.innerHTML = "此條碼已失效，請至服務台重新掃描最新的 QR Code";

        } else {
            // 狀況 C：時間戳記在 70 秒內，但要檢查這組時間戳記是不是已經被這台手機「用過」了
            const lastUsedToken = localStorage.getItem('last_scanned_t');
            
            if (lastUsedToken === String(qrcodeTime)) {
                // 如果這台手機已經拿這組 t 參數成功跳轉過，就不准他刷新網頁重複填寫
                statusTitle.innerHTML = "❌ 請勿重複填寫";
                statusTitle.className = "error";
                statusDesc.innerHTML = "系統偵測到頁面重新整理。若需再次填寫，請重新掃描螢幕上的新條碼。";
            } else {
                // 狀況 D：完全符合資格！新鮮掃描進來的。
                
                // 密技：在跳轉前，立刻把這次的 qrcodeTime 存入快取鎖定！
                localStorage.setItem('last_scanned_t', qrcodeTime);

                statusTitle.innerHTML = "🎉 驗證成功！";
                statusTitle.className = "success";
                statusDesc.innerHTML = "正在為您安全導向至登陸表單...";
                
                // 1.5 秒後自動跳轉到 Google 表單
                setTimeout(() => {
                    window.location.href = targetFormUrl;
                }, 1500);
            }
        }
    </script>
</body>
</html>
