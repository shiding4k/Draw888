<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動登陸轉址系統</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { color: #333; margin-top: 0; }
        .error { color: #e74c3c; font-weight: bold; font-size: 1.5em; }
        .success { color: #2ecc71; font-weight: bold; font-size: 1.2em; }
        
        #iframe-wrapper {
            display: none;
            width: 100%;
            max-width: 640px;
            margin: 20px auto 0 auto;
            height: 80vh;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- 狀態提示區塊 -->
    <div class="container" id="status-container">
        <h2 id="status-title">正在驗證您的現場身分...</h2>
        <p id="status-desc">請稍候，系統正在確認您是否在服務台現場。</p>
    </div>

    <!-- Google 表單內嵌視窗區塊 -->
    <div id="iframe-wrapper">
        <iframe id="form-iframe" src="">正在載入表單...</iframe>
    </div>

    <script>
        // ⚠️ 這裡必須填寫從 Google 表單「<> 內嵌HTML」複製出來的完整長網址！
        // 絕對不能填寫 https://forms.gle/... 短網址
        const targetFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSftUqAeKoe1Jl5B9gT2cY97gpJM4w3OYdxa37OZrY3tWUDyfw/viewform?embedded=true"; 
        
        // 有效時限（秒）
        const expireSeconds = 70; 

        // 確保網頁載入後才執行
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const qrcodeTime = parseInt(urlParams.get('t'), 10); 
            const currentTime = Math.floor(Date.now() / 1000); 

            const statusTitle = document.getElementById('status-title');
            const statusDesc = document.getElementById('status-desc');
            const iframeWrapper = document.getElementById('iframe-wrapper');
            const formIframe = document.getElementById('form-iframe');

            // 檢查參數是否存在與合法
            if (!qrcodeTime || isNaN(qrcodeTime)) {
                statusTitle.innerHTML = "⚠️驗證失敗";
                statusTitle.className = "error";
                statusDesc.innerHTML = "無效的掃描方式，請至服務台掃描QR Code";
                return;
            }

            // 檢查是否過期
            if (currentTime - qrcodeTime > expireSeconds) {
                statusTitle.innerHTML = "⏰ QR Code 已過期";
                statusTitle.className = "error";
                statusDesc.innerHTML = "此條碼已失效，請至服務台重新掃描QR Code";
                return;
            }

            // 檢查是否重複整理
            const lastUsedToken = localStorage.getItem('last_scanned_t');
            if (lastUsedToken && lastUsedToken === String(qrcodeTime)) {
                statusTitle.innerHTML = "⚠️請勿重複填寫";
                statusTitle.className = "error";
                statusDesc.innerHTML = "若需再次填寫，請至服務台重新掃描QR Code";
                return;
            }

            // ─── 通過驗證，顯示表單 ───
            try {
                // 先鎖定這次的時間戳記
                localStorage.setItem('last_scanned_t', String(qrcodeTime));

                statusTitle.innerHTML = "🎉跨櫃買滿888，全家好禮週週發";
                statusTitle.className = "success";
                statusDesc.innerHTML = "請填寫抽獎活動表單";
                
                // 載入並顯示表單
                formIframe.src = targetFormUrl;
                iframeWrapper.style.display = "block";
            } catch (error) {
                // 萬一發生非預期錯誤，改為直接彈出通知並跳轉，不讓畫面卡死
                console.error(error);
                window.location.href = targetFormUrl;
            }
        });
    </script>
</body>
</html>
